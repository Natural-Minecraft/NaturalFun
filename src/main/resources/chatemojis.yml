# ==========================================
#     NATURALFUN - CHAT EMOJIS (ItemsAdder)
# ==========================================
# Emoji menggunakan font image dari ItemsAdder resource pack.
# Setiap emoji memiliki:
#   font_image: ID font image dari ItemsAdder (namespace:name)
#   fallback: Karakter Unicode sebagai fallback jika ItemsAdder tidak ada
#   triggers: Teks pemicu yang akan diganti  
#   permission: Permission khusus (kosong = semua bisa pakai)

enabled: true

# Permission dasar: naturalsmp.emoji.use
# Akses semua: naturalsmp.emoji.*

# ==========================================
#           DAFTAR EMOJI
# ==========================================
list:
